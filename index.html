<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Gallery - Professional Filter</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .gallery-columns { column-gap: 1rem; column-count: 2; }
        @media (min-width: 1024px) { .gallery-columns { column-count: 8; } }
        .waterfall-item { break-inside: avoid; margin-bottom: 1rem; transition: all 0.2s ease; }
        .waterfall-item:hover { transform: translateY(-4px); }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .tag-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; border-width: 1px; white-space: nowrap; }
        .tag-hot { background-color: #fff1f2; color: #be123c; border-color: #fecdd3; font-weight: bold; }
        .tag-special { background-color: #eff6ff; color: #1d4ed8; border-color: #dbeafe; font-weight: bold; }
        .tag-default { background-color: #f9fafb; color: #6b7280; border-color: #f3f4f6; }

        .nav-section { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; }
        .nav-divider { width: 100%; border-top: 1px dashed #e5e7eb; margin: 8px 0; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [rawData, setRawData] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedTag, setSelectedTag] = useState('');
            const [activeItem, setActiveItem] = useState(null);
            const [currentImgIndex, setCurrentImgIndex] = useState(0);
            const [loadStatus, setLoadStatus] = useState('Initializing...');
            const [displayCount, setDisplayCount] = useState(40); 

            const WHATSAPP_NUMBER = "85265426672"; 
            
            // --- 核心修复：只有完全匹配这里的字符串，才会出现在第一行 ---
            // 请确保这里的字母大小写与你 JSON 里的标签完全一致
            const PRIORITY_EXACT_TAGS = new Set(['bags', 'shoes', 'clothing', 'jewelry', 'accessories', 'glasses', 'pants', 'watches', 'other', 'hot', 'sale', 'new', 'premium', 'best', 'vip', 'limited']);

            const getTagClass = (tag) => {
                if (PRIORITY_EXACT_TAGS.has(tag)) return 'tag-hot';
                return 'tag-default';
            };

            useEffect(() => {
                const handleHashChange = () => {
                    const hash = decodeURIComponent(window.location.hash.replace('#', ''));
                    setSelectedTag(hash || '');
                    setDisplayCount(40);
                    window.scrollTo(0, 0);
                };
                handleHashChange();
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            const updateTag = (tag) => { window.location.hash = tag ? encodeURIComponent(tag) : ''; };

            useEffect(() => {
                const fetchAllData = async () => {
                    try {
                        const resIndex = await fetch('./data_index.json');
                        const fileList = await resIndex.json();
                        for (let i = 0; i < fileList.length; i++) {
                            setLoadStatus(`Loading ${i + 1}/${fileList.length}...`);
                            const res = await fetch(`./${fileList[i]}`);
                            const chunk = await res.json();
                            setRawData(prev => [...prev, ...chunk]);
                        }
                        setLoadStatus('');
                    } catch (err) { console.error(err); }
                };
                fetchAllData();
            }, []);

            useEffect(() => {
                const handleScroll = () => {
                    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 800) {
                        setDisplayCount(prev => prev + 40);
                    }
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const allTags = useMemo(() => {
                const tags = rawData.flatMap(i => Array.isArray(i.标签) ? i.标签 : (i.标签 ? [i.标签] : []));
                return [...new Set(tags)].filter(Boolean).sort();
            }, [rawData]);

            // --- 修改后的导航栏拆分逻辑 ---
            const navGroups = useMemo(() => {
                const priority = allTags.filter(t => PRIORITY_EXACT_TAGS.has(t.toLowerCase()));
                const normal = allTags.filter(t => !PRIORITY_EXACT_TAGS.has(t.toLowerCase()));
                return { priority, normal };
            }, [allTags, PRIORITY_EXACT_TAGS]);

            const filteredItems = useMemo(() => {
                const q = searchQuery.toLowerCase().trim();
                return rawData.filter(item => {
                    const matchesSearch = q === '' || (item.标题 || "").toLowerCase().includes(q) || (item.货号 || "").toString().includes(q);
                    const itemTags = Array.isArray(item.标签) ? item.标签 : (item.标签 ? [item.标签] : []);
                    const matchesTag = selectedTag === '' || itemTags.includes(selectedTag);
                    return matchesSearch && matchesTag;
                });
            }, [rawData, searchQuery, selectedTag]);

            return (
                <div className="relative min-h-screen flex flex-col">
                    <header className="sticky top-0 z-40 glass-effect border-b border-gray-200 py-3 px-4">
                        <div className="max-w-[1920px] mx-auto flex items-center gap-4">
                            <div className="text-xl font-black text-gray-900 tracking-tighter cursor-pointer" onClick={() => updateTag('')}>
                                ALBUM<span className="text-pink-500">.</span>
                            </div>
                            <div className="relative flex-1">
                                <input 
                                    type="text" 
                                    placeholder={loadStatus || "Search..."} 
                                    className="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-pink-400 text-sm"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                                <i className="fa fa-search absolute left-3 top-3 text-gray-400"></i>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-[1920px] mx-auto px-4 mt-6 flex-1">
                        <div className="mb-6 flex flex-col gap-2">
                            {/* 第一行：只显示精确匹配的重点标签 */}
                            <div className="nav-section">
                                <button onClick={() => updateTag('')} className={`px-4 py-1.5 rounded-full text-xs font-bold transition ${!selectedTag ? 'bg-black text-white' : 'bg-gray-100 text-gray-600'}`}>
                                    ALL
                                </button>
                                {navGroups.priority.map(tag => (
                                    <button key={tag} onClick={() => updateTag(tag)} className={`px-4 py-1.5 rounded-full text-xs font-bold transition border ${selectedTag === tag ? 'bg-pink-500 border-pink-500 text-white' : 'bg-white border-pink-200 text-pink-600'}`}>
                                        <i className="fa fa-star mr-1"></i> {tag}
                                    </button>
                                ))}
                            </div>

                            {navGroups.normal.length > 0 && <div className="nav-divider"></div>}

                            {/* 第二行：显示所有品牌名或其他具体分类 */}
                            <div className="nav-section no-scrollbar overflow-x-auto pb-2">
                                {navGroups.normal.map(tag => (
                                    <button key={tag} onClick={() => updateTag(tag)} className={`px-3 py-1.5 rounded-md text-xs whitespace-nowrap transition border ${selectedTag === tag ? 'bg-black border-black text-white' : 'bg-white border-gray-200 text-gray-500'}`}>
                                        {tag}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="gallery-columns">
                            {filteredItems.slice(0, displayCount).map(item => {
                                const itemTags = Array.isArray(item.标签) ? item.标签 : (item.标签 ? [item.标签] : []);
                                return (
                                    <div key={item.ID} onClick={() => { setActiveItem(item); setCurrentImgIndex(0); }} className="waterfall-item bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden cursor-pointer">
                                        <div className="relative bg-gray-100">
                                            <img src={item.图片[0]} className="w-full h-auto block" loading="lazy" />
                                        </div>
                                        <div className="p-2">
                                            <p className="text-[10px] font-bold text-pink-600 truncate">{item.货号}</p>
                                            <h3 className="text-[11px] text-gray-700 line-clamp-1 mt-0.5 mb-2">{item.标题}</h3>
                                            <div className="flex flex-wrap gap-1">
                                                {itemTags.map(t => <span key={t} className={`tag-badge ${getTagClass(t)}`}>{t}</span>)}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    {activeItem && (
                        <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/95" onClick={() => setActiveItem(null)}>
                            <img src={activeItem.图片[currentImgIndex]} className="max-h-[80vh] object-contain" />
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
